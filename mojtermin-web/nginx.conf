server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets (Angular outputHashing: "all") can be cached aggressively because
    # their filenames change on every build.
    location ~* \.(?:js|css|woff2?|eot|ttf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so Angular's router can resolve it.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html itself is NOT immutable — it points at the latest hashed bundles.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Generic hardening headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy. The same policy is also set via meta tag in
    # index.html for safety, but the header form is stricter (frame-ancestors
    # only works as a header, not via meta) and is the source of truth in prod.
    #
    # If you deploy the API on a different origin than the frontend, edit
    # `connect-src` (and probably `img-src`) below to whitelist it.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://flagcdn.com https:; font-src 'self' data:; connect-src 'self' http: https:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;

    # Compression for text-y content.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
