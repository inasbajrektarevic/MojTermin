<section class="page working-hours-page">
  <header class="wh-head">
    <h1>Radni sati</h1>
    <p class="wh-lead">Postavite kada je salon otvoren. Klijenti vide samo slobodne termine unutar ovog vremena.</p>
  </header>

  @if (loading) {
    <p class="wh-loading">Učitavanje radnog vremena...</p>
  } @else if (loadError) {
    <p class="error">{{ loadError }}</p>
  } @else {
    <div class="wh-card">
      <div class="rows">
        @for (row of formRows.controls; track $index) {
          <div class="day-row" [formGroup]="$any(row)" [class.is-closed]="$any(row).get('isClosed')?.value">
            <h2 class="day-name">{{ days[$index] }}</h2>

            <div class="day-fields">
              <div class="field">
                <label [attr.for]="'open-' + $index">Otvaranje</label>
                <input
                  [id]="'open-' + $index"
                  type="text"
                  formControlName="openTime"
                  placeholder="07:00"
                  inputmode="numeric"
                  [disabled]="$any(row).get('isClosed')?.value"
                />
              </div>

              <div class="field">
                <label [attr.for]="'close-' + $index">Zatvaranje</label>
                <input
                  [id]="'close-' + $index"
                  type="text"
                  formControlName="closeTime"
                  placeholder="19:00"
                  inputmode="numeric"
                  [disabled]="$any(row).get('isClosed')?.value"
                />
              </div>

              <label class="closed-toggle">
                <input type="checkbox" formControlName="isClosed" (change)="onClosedToggle($index)" />
                <span>Zatvoreno</span>
              </label>
            </div>
          </div>
        }
      </div>

      <div class="wh-actions">
        <button type="button" class="wh-save" (click)="save()" [disabled]="saving">
          {{ saving ? 'Čuvanje...' : 'Sačuvaj promjene' }}
        </button>
      </div>
    </div>
  }
</section>
